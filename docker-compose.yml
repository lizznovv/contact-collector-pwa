services:
    pwa-backend:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: pwa-backend
        ports:
            - '${APP_PORT:-8080}:8080'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
        volumes:
            - './backend:/var/www/html'
        networks:
            - pwa-network
        depends_on:
            - mariadb

    pwa-frontend:
        build:
            context: .
            dockerfile: Dockerfile
            args:
              WWWGROUP: '${WWWGROUP}'
        image: pwa-backend # Используем тот же образ
        ports:
          - "5173:5173"
        environment:
            WWWUSER: '${WWWUSER}'
        volumes:
            - './frontend:/var/www/html'
            - './certs:/var/www/html/certs'
        working_dir: /var/www/html
        #command: npm run dev -- --host # Запускаем vite
        networks:
            - pwa-network

    mariadb:
        image: 'mariadb:10.6'
        restart: on-failure
        ports:
            - '${DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        volumes:
            - mariadb-data:/var/lib/mysql
        networks:
            - pwa-network


networks:
    pwa-network:
        driver: bridge
volumes:
    mariadb-data: